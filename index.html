<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Cambia Colore!</title>
    <style>
        body { text-align: center; padding-top: 50px; font-family: sans-serif; transition: background 0.5s; }
        button { padding: 15px 30px; font-size: 20px; cursor: pointer; }
    </style>
</head>
<body>

    <h1>Cambia il colore dello sfondo</h1>
    <button id="bottone">Cliccami!</button>

    <script>
        // 1. Selezioniamo il pulsante dall'HTML
        const tasto = document.getElementById('bottone');

        // 2. Creiamo una funzione per generare un colore casuale
        function generaColoreCasuale() {
            const lettere = '0123456789ABCDEF';
            let colore = '#';
            for (let i = 0; i < 6; i++) {
                colore += lettere[Math.floor(Math.random() * 16)];
            }
            return colore;
        }

        // 3. Aggiungiamo un "ascoltatore" di eventi (il click)
        tasto.addEventListener('click', function() {
            const nuovoColore = generaColoreCasuale();
            document.body.style.backgroundColor = nuovoColore;
        });
    </script>

</body>
</html>
<!DOCTYPE html>
<html>
<head>
    <title>Generatore di Frasi</title>
    <style>
        body { font-family: sans-serif; text-align: center; margin-top: 100px; background-color: #f0f0f0; }
        #frase { font-size: 24px; font-weight: bold; color: #333; min-height: 50px; }
        button { padding: 10px 20px; font-size: 18px; cursor: pointer; background: #007BFF; color: white; border: none; border-radius: 5px; }
        button:hover { background: #0056b3; }
    </style>
</head>
<body>

    <h1>La tua pillola di saggezza</h1>
    <p id="frase">Clicca il tasto per una frase!</p>
    <button onclick="nuovaFrase()">Dammi un consiglio</button>

    <script>
        // 1. Creiamo una lista (array) di frasi
        const consigli = [
            "Fai una cosa alla volta, ma falla bene.",
            "Il miglior momento per iniziare era ieri. Il secondo è adesso.",
            "Sbagliare è il primo passo per imparare.",
            "Non fermarti quando sei stanco, fermati quando hai finito.",
            "JavaScript è più facile di quanto sembri!",
            "Bevi un bicchiere d'acqua, ti farà bene."
        ];

        function nuovaFrase() {
            // 2. Scegliamo un indice a caso tra 0 e la lunghezza della lista
            const indiceCasuale = Math.floor(Math.random() * consigli.length);
            
            // 3. Prendiamo la frase corrispondente
            const fraseScelta = consigli[indiceCasuale];

            // 4. La mostriamo nel paragrafo con id="frase"
            document.getElementById("frase").innerText = fraseScelta;
        }
    </script>

</body>
</html>
<!DOCTYPE html>
<html>
<head>
    <title>Particelle Magiche</title>
    <style>
        body { margin: 0; overflow: hidden; background: #050505; }
        canvas { display: block; }
    </style>
</head>
<body>

<canvas id="canvas"></canvas>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let particelle = [];

    // Crea una particella
    class Particella {
        constructor(x, y) {
            this.x = x;
            this.y = y;
            this.size = Math.random() * 5 + 1;
            this.speedX = Math.random() * 3 - 1.5;
            this.speedY = Math.random() * 3 - 1.5;
            this.color = `hsl(${Math.random() * 360}, 100%, 50%)`;
        }

        update() {
            this.x += this.speedX;
            this.y += this.speedY;
            if (this.size > 0.1) this.size -= 0.1;
        }

        draw() {
            ctx.fillStyle = this.color;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    // Gestione movimento mouse
    window.addEventListener('mousemove', function(event) {
        for (let i = 0; i < 5; i++) {
            particelle.push(new Particella(event.x, event.y));
        }
    });

    function anima() {
        ctx.fillStyle = 'rgba(0,0,0,0.1)'; // Crea l'effetto "scia"
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        for (let i = 0; i < particelle.length; i++) {
            particelle[i].update();
            particelle[i].draw();
            
            // Rimuove particelle troppo piccole
            if (particelle[i].size <= 0.1) {
                particelle.splice(i, 1);
                i--;
            }
        }
        requestAnimationFrame(anima); // Crea un loop fluido a 60fps
    }

    anima();

    // Adatta il canvas se ridimensioni la finestra
    window.addEventListener('resize', () => {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    });
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Matrix JS</title>
    <style>
        body { margin: 0; background: black; overflow: hidden; }
        canvas { display: block; }
    </style>
</head>
<body>

<canvas id="matrix"></canvas>

<script>
    const canvas = document.getElementById('matrix');
    const ctx = canvas.getContext('2d');

    // Impostiamo il canvas a tutto schermo
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    // Caratteri da usare (Katakana, numeri e simboli)
    const caratteri = "ABCDEFGHIJKLMNOPQRSTUVWXYZ123456789@#$%^&*()*&^";
    const arrayCaratteri = caratteri.split("");

    const fontSize = 16;
    const colonne = canvas.width / fontSize; // Numero di colonne per la pioggia

    // Un array per tracciare la posizione Y di ogni colonna
    const gocce = [];
    for (let x = 0; x < colonne; x++) {
        gocce[x] = 1; 
    }

    function draw() {
        // Sfondo semitrasparente nero per creare l'effetto scia
        ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.fillStyle = "#0F0"; // Colore verde Matrix
        ctx.font = fontSize + "px arial";

        for (let i = 0; i < gocce.length; i++) {
            // Scegliamo un carattere casuale
            const testo = arrayCaratteri[Math.floor(Math.random() * arrayCaratteri.length)];
            
            // Disegniamo il carattere
            ctx.fillText(testo, i * fontSize, gocce[i] * fontSize);

            // Se la "goccia" arriva a fine schermo, la resettiamo casualmente
            if (gocce[i] * fontSize > canvas.height && Math.random() > 0.975) {
                gocce[i] = 0;
            }

            // Spostiamo la goccia verso il basso
            gocce[i]++;
        }
    }

    // Eseguiamo la funzione ogni 33 millisecondi (circa 30fps)
    setInterval(draw, 33);

    // Gestione ridimensionamento finestra
    window.addEventListener('resize', () => {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    });
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Esplosione di Stelle</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; cursor: crosshair; }
        canvas { display: block; }
    </style>
</head>
<body>

<canvas id="canvas"></canvas>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let particelle = [];

    class Particella {
        constructor(x, y, color) {
            this.x = x;
            this.y = y;
            this.color = color;
            // Direzione casuale a 360 gradi
            this.angle = Math.random() * Math.PI * 2;
            this.velocity = Math.random() * 8 + 2;
            this.friction = 0.95; // Rallenta col tempo
            this.gravity = 0.2;   // Cade verso il basso
            this.alpha = 1;       // Trasparenza iniziale
            this.decay = Math.random() * 0.02 + 0.01; // Velocità di svenimento
        }

        draw() {
            ctx.save();
            ctx.globalAlpha = this.alpha;
            ctx.fillStyle = this.color;
            ctx.beginPath();
            ctx.arc(this.x, this.y, 3, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        }

        update() {
            this.velocity *= this.friction;
            this.x += Math.cos(this.angle) * this.velocity;
            this.y += Math.sin(this.angle) * this.velocity + this.gravity;
            this.alpha -= this.decay;
        }
    }

    function creaEsplosione(x, y) {
        const colore = `hsl(${Math.random() * 360}, 100%, 60%)`;
        for (let i = 0; i < 40; i++) {
            particelle.push(new Particella(x, y, colore));
        }
    }

    window.addEventListener('mousedown', (e) => {
        creaEsplosione(e.clientX, e.clientY);
    });

    function loop() {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.2)'; // Effetto scia
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        particelle.forEach((p, index) => {
            if (p.alpha <= 0) {
                particelle.splice(index, 1);
            } else {
                p.update();
                p.draw();
            }
        });
        requestAnimationFrame(loop);
    }

    loop();

    window.addEventListener('resize', () => {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    });
</script>

</body>
</html>
<!DOCTYPE html>
<html>
<head>
    <title>Scia Neon</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; }
        canvas { display: block; }
    </style>
</head>
<body>

<canvas id="sciaCanvas"></canvas>

<script>
    const canvas = document.getElementById('sciaCanvas');
    const ctx = canvas.getContext('2d');

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let punti = [];
    const maxPunti = 50; // Lunghezza della scia

    window.addEventListener('mousemove', (e) => {
        // Aggiungiamo la posizione del mouse all'inizio dell'array
        punti.unshift({ x: e.clientX, y: e.clientY });

        // Se la scia è troppo lunga, togliamo l'ultimo pezzo
        if (punti.length > maxPunti) {
            punti.pop();
        }
    });

    function anima() {
        // Trucco: rettangolo nero quasi trasparente per pulire lentamente
        ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Disegniamo la scia
        ctx.beginPath();
        ctx.lineWidth = 3;
        ctx.strokeStyle = '#00f2ff'; // Colore Ciano Neon
        ctx.shadowBlur = 15;
        ctx.shadowColor = '#00f2ff';

        for (let i = 0; i < punti.length; i++) {
            const p = punti[i];
            if (i === 0) ctx.moveTo(p.x, p.y);
            else ctx.lineTo(p.x, p.y);
        }
        
        ctx.stroke();
        requestAnimationFrame(anima);
    }

    anima();

    // Per evitare errori se ridimensioni la finestra
    window.addEventListener('resize', () => {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    });
</script>

</body>
</html>
<!DOCTYPE html>
<html>
<head>
    <title>Bolle Magiche</title>
    <style>
        body { margin: 0; overflow: hidden; background: linear-gradient(to bottom, #1a2a6c, #b21f1f, #fdbb2d); height: 100vh; }
        canvas { display: block; }
    </style>
</head>
<body>

    <canvas id="canvasBolle"></canvas>

    <script>
        // Questo comando assicura che il codice parta SOLO quando la pagina è pronta
        window.onload = function() {
            const canvas = document.getElementById('canvasBolle');
            const ctx = canvas.getContext('2d');
            
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            let particelle = [];

            class Bolla {
                constructor(x, y) {
                    this.x = x;
                    this.y = y;
                    this.size = Math.random() * 15 + 5;
                    this.speedX = Math.random() * 3 - 1.5;
                    this.speedY = Math.random() * -3 - 1; // Vanno verso l'alto
                    this.color = 'rgba(255, 255, 255, 0.5)';
                }

                aggiorna() {
                    this.x += this.speedX;
                    this.y += this.speedY;
                    if (this.size > 0.2) this.size -= 0.1;
                }

                disegna() {
                    ctx.fillStyle = this.color;
                    ctx.strokeStyle = 'white';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.stroke();
                }
            }

            function gestisciBolle() {
                for (let i = 0; i < particelle.length; i++) {
                    particelle[i].aggiorna();
                    particelle[i].disegna();
                    if (particelle[i].size <= 0.3) {
                        particelle.splice(i, 1);
                        i--;
                    }
                }
            }

            window.addEventListener('mousemove', function(e) {
                particelle.push(new Bolla(e.x, e.y));
            });

            function anima() {
                // Puliamo lo schermo a ogni frame
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                gestisciBolle();
                requestAnimationFrame(anima);
            }

            anima();

            window.addEventListener('resize', function() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            });
        };
    </script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Effetto Energia Gigantesco</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; }
        canvas { display: block; }
    </style>
</head>
<body>

<canvas id="canvasEnergia"></canvas>

<script>
    window.onload = function() {
        const canvas = document.getElementById('canvasEnergia');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let particelle = [];
        const mouse = { x: null, y: null, radius: 150 };

        window.addEventListener('mousemove', function(e) {
            mouse.x = e.x;
            mouse.y = e.y;
        });

        class Particella {
            constructor(x, y, dx, dy, size, color) {
                this.x = x;
                this.y = y;
                this.dx = dx; // Velocità X
                this.dy = dy; // Velocità Y
                this.size = size;
                this.color = color;
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2, false);
                ctx.fillStyle = '#00d4ff';
                ctx.fill();
            }
            update() {
                // Rimbalzo sui bordi
                if (this.x > canvas.width || this.x < 0) this.dx = -this.dx;
                if (this.y > canvas.height || this.y < 0) this.dy = -this.dy;
                this.x += this.dx;
                this.y += this.dy;
                this.draw();
            }
        }

        function init() {
            particelle = [];
            let numeroParticelle = (canvas.height * canvas.width) / 9000; // Quantità enorme ma fluida
            for (let i = 0; i < numeroParticelle; i++) {
                let size = (Math.random() * 2) + 1;
                let x = (Math.random() * (innerWidth - size * 2) + size);
                let y = (Math.random() * (innerHeight - size * 2) + size);
                let dx = (Math.random() * 2) - 1;
                let dy = (Math.random() * 2) - 1;
                particelle.push(new Particella(x, y, dx, dy, size, '#00d4ff'));
            }
        }

        function connetti() {
            let opacita = 1;
            for (let a = 0; a < particelle.length; a++) {
                for (let b = a; b < particelle.length; b++) {
                    let distanza = ((particelle[a].x - particelle[b].x) * (particelle[a].x - particelle[b].x))
                                 + ((particelle[a].y - particelle[b].y) * (particelle[a].y - particelle[b].y));
                    
                    if (distanza < (canvas.width / 7) * (canvas.height / 7)) {
                        opacita = 1 - (distanza / 20000);
                        ctx.strokeStyle = `rgba(0, 212, 255, ${opacita})`;
                        ctx.lineWidth = 1;
                        ctx.beginPath();
                        ctx.moveTo(particelle[a].x, particelle[a].y);
                        ctx.lineTo(particelle[b].x, particelle[b].y);
                        ctx.stroke();
                    }
                }
            }
        }

        function anima() {
            requestAnimationFrame(anima);
            ctx.clearRect(0, 0, innerWidth, innerHeight);
            particelle.forEach(p => p.update());
            connetti();
        }

        init();
        anima();

        window.addEventListener('resize', () => {
            canvas.width = innerWidth;
            canvas.height = innerHeight;
            init();
        });
    }
</script>
</body>
</html>
