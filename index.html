<!DOCTYPE html>
<html>
<head>
    <title>Caleidoscopio Neurale</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; }
        canvas { display: block; }
        
        .navbar {
    display: flex;
    justify-content: space-between; /* Spazia logo e link */
    align-items: center;
    background-color: #333;
    padding: 10px 20px;
    color: white;
}

.nav-links {
    display: flex;
    list-style: none; /* Rimuove i pallini della lista */
}

.nav-links li {
    margin-left: 20px;
}

.nav-links a {
    color: white;
    text-decoration: none; /* Rimuove la sottolineatura */
}

.nav-links a:hover {
    color: #00d4ff; /* Cambia colore al passaggio del mouse */
}

    </style>
</head>
<body>
    <nav class="navbar">
    <div class="logo">MioSito</div>
    <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="sfondo.html">Sfodo</a></li>

    </ul>
</nav>

    
    <canvas id="canvas"></canvas>



<script>
    window.onload = function() {
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let w, h, particles;
        let tick = 0;

        function init() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
            particles = [];
        }

        window.addEventListener('resize', init);

        function draw() {
            // Effetto scia per rendere tutto fluido
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, w, h);

            ctx.save();
            ctx.translate(w / 2, h / 2); // Sposta l'origine al centro
            
            // Crea 8 "specchi" (riflessi simmetrici)
            for (let i = 0; i < 8; i++) {
                ctx.rotate(Math.PI / 4);
                disegnaRaggio(tick);
            }
            ctx.restore();

            tick += 0.02;
            requestAnimationFrame(draw);
        }

        function disegnaRaggio(t) {
            ctx.beginPath();
            for (let i = 0; i < 20; i++) {
                // Matematica per creare le curve eleganti
                let x = Math.sin(t + i * 0.2) * (i * 15);
                let y = Math.cos(t + i * 0.1) * (i * 15);
                
                // Colore che cambia nel tempo (Arcobaleno Neon)
                ctx.strokeStyle = `hsl(${(t * 50 + i * 10) % 360}, 100%, 50%)`;
                ctx.lineWidth = i / 2;
                
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            ctx.stroke();
        }

        init();
        draw();
    };
</script>
</body>
</html>
