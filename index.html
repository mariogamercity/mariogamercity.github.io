<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Mario HUB | Ultra Dashboard v4.2</title>
    <script type="importmap">
    {
        "imports": {
            "@google/generative-ai": "https://esm.run/@google/generative-ai"
        }
    }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');

        :root {
            --bg: #030712;
            --card-bg: rgba(17, 24, 39, 0.8);
            --accent: #06b6d4;
            --accent-glow: rgba(6, 182, 212, 0.3);
            --text: #f9fafb;
            --text-dim: #9ca3af;
            --border: rgba(255, 255, 255, 0.1);
            --glass: blur(15px);
            --danger: #ef4444;
            --premium-gold: #facc15;
        }

        body.premium-mode {
            --accent: #facc15;
            --accent-glow: rgba(250, 204, 21, 0.4);
            background-image: radial-gradient(circle at 0% 0%, rgba(250, 204, 21, 0.2) 0%, transparent 50%), radial-gradient(circle at 100% 100%, rgba(251, 146, 60, 0.15) 0%, transparent 50%);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background-color: var(--bg); color: var(--text); min-height: 100vh; transition: 0.8s ease; overflow-x: hidden; }

        /* --- NAVBAR --- */
        nav { position: sticky; top: 0; z-index: 1000; background: rgba(3, 7, 18, 0.9); backdrop-filter: var(--glass); border-bottom: 1px solid var(--border); display: flex; justify-content: center; padding: 1rem; overflow-x: auto; }
        nav button { background: transparent; border: none; color: var(--text-dim); padding: 0.6rem 1.2rem; margin: 0 5px; cursor: pointer; font-weight: 600; font-size: 0.85rem; border-radius: 12px; transition: 0.3s; white-space: nowrap; }
        nav button.active { color: var(--accent); background: var(--accent-glow); box-shadow: 0 0 15px var(--accent-glow); }

        .container { max-width: 1300px; margin: 2rem auto; width: 100%; padding: 0 20px; flex-grow: 1; }
        .section { display: none; animation: slideUp 0.5s ease-out forwards; }
        .section.active { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .card { background: var(--card-bg); backdrop-filter: var(--glass); border: 1px solid var(--border); border-radius: 28px; padding: 2.5rem; box-shadow: 0 20px 40px rgba(0,0,0,0.4); }

        /* --- HOME --- */
        .home-layout { display: grid; grid-template-columns: 1fr 380px; gap: 2rem; }
        @media (max-width: 1000px) { .home-layout { grid-template-columns: 1fr; } }
        .clock { font-size: 5.5rem; font-weight: 800; color: var(--accent); text-shadow: 0 0 30px var(--accent-glow); line-height: 1; margin: 0.5rem 0; }
        
        .quick-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr)); gap: 1rem; margin: 2rem 0; }
        .quick-item { background: rgba(255,255,255,0.03); border: 1px solid var(--border); padding: 1.2rem; border-radius: 20px; text-decoration: none; color: white; display: flex; flex-direction: column; align-items: center; gap: 8px; transition: 0.3s; }
        .quick-item:hover { background: var(--accent-glow); border-color: var(--accent); transform: translateY(-8px); }

        .btn-mode-xl { width: 100%; padding: 1.5rem; border-radius: 20px; font-size: 1.2rem; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; cursor: pointer; transition: 0.4s; border: none; display: flex; align-items: center; justify-content: center; gap: 15px; margin-top: 2rem; }
        #premium-btn { background: linear-gradient(90deg, #facc15, #fb923c); color: #000; box-shadow: 0 10px 30px rgba(250, 204, 21, 0.3); }
        #standard-btn { background: rgba(255, 255, 255, 0.05); color: var(--text); border: 1px solid var(--border); display: none; }
        body.premium-mode #premium-btn { display: none; }
        body.premium-mode #standard-btn { display: flex; }

        /* --- SETTINGS (CUSTOM) --- */
        .settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; text-align: left; }
        @media (max-width: 800px) { .settings-grid { grid-template-columns: 1fr; } }
        .settings-group { display: flex; flex-direction: column; gap: 10px; }
        .settings-group label { font-size: 0.75rem; font-weight: 800; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; }
        .settings-group input { background: #000; border: 1px solid var(--border); padding: 12px; border-radius: 12px; color: white; outline: none; }
        
        .link-manager-row { display: grid; grid-template-columns: 80px 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        .danger-zone { border-top: 1px solid var(--border); margin-top: 2rem; padding-top: 2rem; text-align: center; }
        .btn-danger { background: transparent; border: 1px solid var(--danger); color: var(--danger); padding: 1rem; border-radius: 15px; font-weight: 800; cursor: pointer; width: 100%; transition: 0.3s; }
        .btn-danger:hover { background: var(--danger); color: white; }

        /* --- AI CHAT --- */
        .chat-window { height: 55vh; overflow-y: auto; display: flex; flex-direction: column; gap: 1rem; padding-right: 10px; margin-bottom: 20px; }
        .bubble { max-width: 85%; padding: 1rem 1.5rem; border-radius: 20px; font-size: 0.95rem; line-height: 1.5; }
        .user-bubble { align-self: flex-end; background: var(--accent); color: #000; font-weight: 600; }
        .ai-bubble { align-self: flex-start; background: #1f2937; border-left: 4px solid var(--accent); white-space: pre-wrap; }

        /* --- CAPTCHA --- */
        #captcha-screen { position: fixed; inset: 0; background: var(--bg); z-index: 2000; display: flex; align-items: center; justify-content: center; }
        .captcha-card { background: var(--card-bg); border: 2px solid var(--accent); padding: 3rem; border-radius: 30px; text-align: center; backdrop-filter: var(--glass); }
    </style>
</head>
<body id="main-body">

    <div id="captcha-screen">
        <div class="captcha-card">
            <h2 style="color: var(--accent); margin-bottom: 10px;">IDENTITY CHECK</h2>
            <div style="background: rgba(255,255,255,0.05); padding: 20px; border-radius: 15px; border: 1px solid var(--border);">
                <input type="checkbox" id="verify-check" style="transform: scale(2); cursor: pointer;" onclick="verifyUser()">
                <label for="verify-check" style="margin-left: 15px; font-size: 1.2rem; font-weight: 600; cursor: pointer;">Non sono un robot</label>
            </div>
        </div>
    </div>

    <nav>
        <button onclick="switchTab('home')" id="tab-home" class="active">HOME</button>
        <button onclick="switchTab('ai')" id="tab-ai">GEMINI AI</button>
        <button onclick="switchTab('notes')" id="tab-notes">NOTE</button>
        <button onclick="switchTab('tools')" id="tab-tools">TOOLS</button>
        <button onclick="switchTab('music')" id="tab-music">MUSIC</button>
        <button onclick="switchTab('custom')" id="tab-custom">CUSTOM</button>
    </nav>

    <div class="container">
        <section id="home" class="section active">
            <div class="home-layout">
                <div class="card">
                    <h1 id="hi-name" style="font-size: 3rem;">Bentornato, Game</h1>
                    <div id="clock" class="clock">00:00:00</div>
                    <div id="quick-links-display" class="quick-grid"></div>
                    <button class="btn-mode-xl" id="premium-btn" onclick="togglePremium(true)">✨ Diventa Premium ✨</button>
                    <button class="btn-mode-xl" id="standard-btn" onclick="togglePremium(false)">🔄 Torna Standard</button>
                </div>
                <aside class="card" style="padding: 1.5rem;">
                    <h3 style="color: var(--accent); margin-bottom: 1rem; font-size: 0.8rem; letter-spacing: 2px;">NOTIZIE FLASH</h3>
                    <div id="news-container" style="font-size: 0.8rem;">Caricamento...</div>
                </aside>
            </div>
        </section>

        <section id="custom" class="section">
            <div class="card">
                <h2 style="color: var(--accent); margin-bottom: 2rem;">HUB CONFIGURATION</h2>
                <div class="settings-grid">
                    <div class="settings-group">
                        <label>Nome Display</label>
                        <input type="text" id="pref-name" placeholder="Es. G4M3">
                        
                        <label>Gemini API Key</label>
                        <input type="password" id="pref-api" placeholder="Incolla la chiave reale">
                        
                        <label>Spotify Playlist URL</label>
                        <input type="text" id="pref-spotify" placeholder="Link della playlist">
                        
                        <label>Colore Accento</label>
                        <input type="color" id="pref-color" style="height:50px; width:100%; border:none; background:none; cursor:pointer;">
                    </div>

                    <div class="settings-group">
                        <label>Gestore Link Rapidi (Icona | Nome | URL)</label>
                        <div class="link-manager-row">
                            <input type="text" id="link-icon-0" placeholder="🔍">
                            <input type="text" id="link-name-0" placeholder="Google">
                            <input type="text" id="link-url-0" placeholder="https://...">
                        </div>
                        <div class="link-manager-row">
                            <input type="text" id="link-icon-1" placeholder="📺">
                            <input type="text" id="link-name-1" placeholder="YouTube">
                            <input type="text" id="link-url-1" placeholder="https://...">
                        </div>
                        <div class="link-manager-row">
                            <input type="text" id="link-icon-2" placeholder="✉️">
                            <input type="text" id="link-name-2" placeholder="Gmail">
                            <input type="text" id="link-url-2" placeholder="https://...">
                        </div>
                        <button onclick="savePrefs()" style="background:var(--accent); color:#000; border:none; padding:15px; border-radius:12px; font-weight:800; cursor:pointer; margin-top:10px;">SALVA TUTTE LE MODIFICHE</button>
                    </div>
                </div>

                <div class="danger-zone">
                    <h3 style="color:var(--danger); margin-bottom:10px;">DANGER ZONE</h3>
                    <button class="btn-danger" onclick="resetAllNotes()">RESETTA TUTTI I FILE NOTES</button>
                </div>
            </div>
        </section>

        <section id="ai" class="section">
            <div class="card" style="max-width: 900px; margin: 0 auto;">
                <div id="chat-window" class="chat-window"></div>
                <div style="display:flex; gap:10px;">
                    <input type="text" id="ai-input" style="flex-grow:1; background:#000; border:1px solid var(--border); padding:15px; border-radius:15px; color:white;" placeholder="Chiedi a Gemini 2.0..." onkeypress="if(event.key==='Enter') sendAI()">
                    <button onclick="sendAI()" style="background:var(--accent); border:none; padding:0 30px; border-radius:15px; font-weight:800; cursor:pointer;">SEND</button>
                </div>
            </div>
        </section>

        <section id="notes" class="section">
            <div class="card">
                <h2 style="margin-bottom: 20px; color: var(--accent);">STREAK NOTES</h2>
                <div style="display:flex; gap:10px; margin-bottom:20px;">
                    <input type="text" id="note-text" style="flex-grow:1; background:#000; border:1px solid var(--border); padding:15px; border-radius:15px; color:white;" placeholder="Nuova nota..." onkeypress="if(event.key==='Enter') addNote()">
                    <button onclick="addNote()" style="background:var(--accent); border:none; padding:0 30px; border-radius:15px; font-weight:800; cursor:pointer;">SAVE</button>
                </div>
                <div id="notes-grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px;"></div>
            </div>
        </section>

        <section id="tools" class="section">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 2rem;">
                <div class="card">
                    <h2 style="color:var(--accent); margin-bottom:1rem;">CALCOLATRICE</h2>
                    <div id="calc-display" style="width:100%; height:80px; background:#000; border-radius:15px; text-align:right; padding:1.5rem; font-size:2rem; color:var(--accent); border:1px solid var(--border); margin-bottom:1rem; display:flex; align-items:center; justify-content:flex-end;">0</div>
                    <div id="calc-buttons" style="display:grid; grid-template-columns:repeat(4, 1fr); gap:10px;"></div>
                </div>
                <div class="card" style="text-align:center;">
                    <h2 style="color:var(--accent); margin-bottom:1rem;">POMODORO</h2>
                    <div id="timer-display" style="font-size: 5rem; font-weight: 800; color: var(--accent); margin: 1rem 0;">25:00</div>
                    <button onclick="toggleTimer()" id="timer-toggle" style="background:var(--accent); color:#000; border:none; padding:15px 30px; border-radius:12px; font-weight:800; cursor:pointer;">START</button>
                </div>
            </div>
        </section>

        <section id="music" class="section">
            <div class="card" id="spotify-container"></div>
        </section>
    </div>

    <script type="module">
        import { GoogleGenerativeAI } from "@google/generative-ai";
        window.sendAI = async function() {
            const rawKey = localStorage.getItem('hub-api');
            const apiKey = rawKey ? rawKey.replace(/[^ -~]/g, "").trim() : null;
            const input = document.getElementById('ai-input');
            const windowMsg = document.getElementById('chat-window');
            if(!apiKey) return alert("Inserisci API Key in CUSTOM!");
            if(!input.value.trim()) return;

            windowMsg.innerHTML += `<div class="bubble user-bubble">${input.value}</div>`;
            const prompt = input.value; input.value = '';
            const aiId = 'ai-' + Date.now();
            windowMsg.innerHTML += `<div class="bubble ai-bubble" id="${aiId}">...</div>`;
            windowMsg.scrollTop = windowMsg.scrollHeight;

            try {
                const genAI = new GoogleGenerativeAI(apiKey);
                const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });
                const result = await model.generateContent(prompt);
                document.getElementById(aiId).innerText = result.response.text();
            } catch (e) { document.getElementById(aiId).innerText = "Errore: " + e.message; }
            windowMsg.scrollTop = windowMsg.scrollHeight;
        }
    </script>

    <script>
        function verifyUser() { setTimeout(() => { document.getElementById('captcha-screen').style.display = 'none'; }, 600); }
        function switchTab(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('nav-' + id).classList.add('active');
            if(id === 'home') loadNews();
            if(id === 'music') loadSpotify();
        }

        // --- PREFS E LINK RAPIDI ---
        const defaultLinks = [
            { icon: "🔍", name: "Google", url: "https://google.com" },
            { icon: "📺", name: "YouTube", url: "https://youtube.com" },
            { icon: "✉️", name: "Gmail", url: "https://gmail.com" }
        ];

        function savePrefs() {
            localStorage.setItem('hub-name', document.getElementById('pref-name').value);
            localStorage.setItem('hub-api', document.getElementById('pref-api').value);
            localStorage.setItem('hub-color', document.getElementById('pref-color').value);
            localStorage.setItem('hub-spotify', document.getElementById('pref-spotify').value);
            
            const links = [];
            for(let i=0; i<3; i++) {
                links.push({
                    icon: document.getElementById(`link-icon-${i}`).value || "🔗",
                    name: document.getElementById(`link-name-${i}`).value || "Link",
                    url: document.getElementById(`link-url-${i}`).value || "#"
                });
            }
            localStorage.setItem('hub-links', JSON.stringify(links));
            applyPrefs();
            alert("Sistema Sincronizzato!");
        }

        function applyPrefs() {
            const name = localStorage.getItem('hub-name') || "Game";
            const color = localStorage.getItem('hub-color') || "#06b6d4";
            const isPremium = localStorage.getItem('hub-premium') === 'true';
            const links = JSON.parse(localStorage.getItem('hub-links')) || defaultLinks;

            document.getElementById('hi-name').innerText = "Benvenuto, " + name;
            document.documentElement.style.setProperty('--accent', color);
            document.documentElement.style.setProperty('--accent-glow', color + "44");
            
            document.getElementById('pref-name').value = name;
            document.getElementById('pref-api').value = localStorage.getItem('hub-api') || "";
            document.getElementById('pref-color').value = color;
            document.getElementById('pref-spotify').value = localStorage.getItem('hub-spotify') || "";
            
            // Popola Editor Links
            links.forEach((l, i) => {
                document.getElementById(`link-icon-${i}`).value = l.icon;
                document.getElementById(`link-name-${i}`).value = l.name;
                document.getElementById(`link-url-${i}`).value = l.url;
            });

            // Display Links nella Home
            document.getElementById('quick-links-display').innerHTML = links.map(l => `
                <a href="${l.url}" target="_blank" class="quick-item"><span>${l.icon}</span><small>${l.name}</small></a>
            `).join('');

            document.getElementById('main-body').classList.toggle('premium-mode', isPremium);
        }

        function togglePremium(mode) { localStorage.setItem('hub-premium', mode); applyPrefs(); }
        function resetAllNotes() { if(confirm("CANCELLARE TUTTO?")) { localStorage.removeItem('hub-notes'); loadNotes(); } }

        // --- ALTRE FUNZIONI ---
        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('it-IT'); }, 1000);
        function addNote() {
            const input = document.getElementById('note-text'); if(!input.value.trim()) return;
            const notes = JSON.parse(localStorage.getItem('hub-notes') || "[]");
            notes.push(input.value); localStorage.setItem('hub-notes', JSON.stringify(notes)); input.value = ''; loadNotes();
        }
        function loadNotes() {
            const notes = JSON.parse(localStorage.getItem('hub-notes') || "[]");
            document.getElementById('notes-grid').innerHTML = notes.map((n, i) => `<div class="card" style="padding:1rem; position:relative;"><button onclick="deleteNote(${i})" style="position:absolute; top:5px; right:10px; color:var(--danger); background:none; border:none; cursor:pointer;">×</button><p>${n}</p></div>`).join('');
        }
        function deleteNote(i) {
            const notes = JSON.parse(localStorage.getItem('hub-notes') || "[]");
            notes.splice(i, 1); localStorage.setItem('hub-notes', JSON.stringify(notes)); loadNotes();
        }
        function loadSpotify() {
            const url = localStorage.getItem('hub-spotify');
            if(url) document.getElementById('spotify-container').innerHTML = `<iframe style="border-radius:12px" src="${url}" width="100%" height="450" frameBorder="0" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>`;
        }
        async function loadNews() {
            try {
                const res = await fetch('https://api.rss2json.com/v1/api.json?rss_url=https://www.ansa.it/sito/ansait_rss.xml');
                const data = await res.json();
                document.getElementById('news-container').innerHTML = data.items.slice(0, 5).map(i => `<div style="border-bottom:1px solid var(--border); padding:5px 0;">${i.title}</div>`).join('');
            } catch(e) {}
        }
        function initCalc() {
            const btns = ['C', 'DEL', '%', '/', '7', '8', '9', '*', '4', '5', '6', '-', '1', '2', '3', '+', '0', '.', '='];
            document.getElementById('calc-buttons').innerHTML = btns.map(b => `<button style="height:50px; border-radius:10px; border:none; background:#374151; color:white; font-weight:bold; cursor:pointer;" onclick="press('${b}')">${b}</button>`).join('');
        }
        let cv = "";
        window.press = (k) => {
            const d = document.getElementById('calc-display');
            if(k === 'C') cv = ""; else if(k === 'DEL') cv = cv.slice(0,-1);
            else if(k === '=') { try { cv = eval(cv.toString()).toString(); } catch { cv = "Error"; } }
            else cv += k; d.innerText = cv || "0";
        }

        window.onload = () => { applyPrefs(); initCalc(); loadNews(); loadNotes(); };
    </script>
</body>
</html>
