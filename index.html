<!DOCTYPE html>
<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Cambia Colore!</title>
    <style>
        body { text-align: center; padding-top: 50px; font-family: sans-serif; transition: background 0.5s; }
        button { padding: 15px 30px; font-size: 20px; cursor: pointer; }
    </style>
</head>
<body>

    <h1>Cambia il colore dello sfondo</h1>
    <button id="bottone">Cliccami!</button>

    <script>
        // 1. Selezioniamo il pulsante dall'HTML
        const tasto = document.getElementById('bottone');

        // 2. Creiamo una funzione per generare un colore casuale
        function generaColoreCasuale() {
            const lettere = '0123456789ABCDEF';
            let colore = '#';
            for (let i = 0; i < 6; i++) {
                colore += lettere[Math.floor(Math.random() * 16)];
            }
            return colore;
        }

        // 3. Aggiungiamo un "ascoltatore" di eventi (il click)
        tasto.addEventListener('click', function() {
            const nuovoColore = generaColoreCasuale();
            document.body.style.backgroundColor = nuovoColore;
        });
    </script>

</body>
</html>
<!DOCTYPE html>
<html>
<head>
    <title>Generatore di Frasi</title>
    <style>
        body { font-family: sans-serif; text-align: center; margin-top: 100px; background-color: #f0f0f0; }
        #frase { font-size: 24px; font-weight: bold; color: #333; min-height: 50px; }
        button { padding: 10px 20px; font-size: 18px; cursor: pointer; background: #007BFF; color: white; border: none; border-radius: 5px; }
        button:hover { background: #0056b3; }
    </style>
</head>
<body>

    <h1>La tua pillola di saggezza</h1>
    <p id="frase">Clicca il tasto per una frase!</p>
    <button onclick="nuovaFrase()">Dammi un consiglio</button>

    <script>
        // 1. Creiamo una lista (array) di frasi
        const consigli = [
            "Fai una cosa alla volta, ma falla bene.",
            "Il miglior momento per iniziare era ieri. Il secondo è adesso.",
            "Sbagliare è il primo passo per imparare.",
            "Non fermarti quando sei stanco, fermati quando hai finito.",
            "JavaScript è più facile di quanto sembri!",
            "Bevi un bicchiere d'acqua, ti farà bene."
        ];

        function nuovaFrase() {
            // 2. Scegliamo un indice a caso tra 0 e la lunghezza della lista
            const indiceCasuale = Math.floor(Math.random() * consigli.length);
            
            // 3. Prendiamo la frase corrispondente
            const fraseScelta = consigli[indiceCasuale];

            // 4. La mostriamo nel paragrafo con id="frase"
            document.getElementById("frase").innerText = fraseScelta;
        }
    </script>

</body>
</html>
